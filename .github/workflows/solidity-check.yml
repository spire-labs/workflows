on:
  workflow_call:
    inputs:
      contract-directory:
        type: string
        required: false
        default: contracts
        description: the root folder for contracts
      run-integration-tests:
        type: boolean
        required: false
        default: true
        description: whether to run integration tests
      env-vars:
        description: 'Multiline list of KEY=VALUE pairs to set in the environment'
        required: false
        default: ''
        type: string
      use-bun:
        type: boolean
        required: false
        default: false
        description: whether to use Bun instead of Foundry for package management
      private-submodule-repositories:
        type: string
        required: false
        default: ""
        description: "Newline-separated repositories to include in a GitHub App token for private submodules"
      ci-submodules-app-client-id:
        type: string
        required: false
        default: ""
        description: "GitHub App client ID used to read private submodules"
    secrets:
      ci_submodules_app_private_key:
        required: false
          
jobs:
  check:
    name: "Solidity Check"
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App installation token
        if: ${{ inputs.private-submodule-repositories != '' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.ci-submodules-app-client-id }}
          private-key: ${{ secrets.ci_submodules_app_private_key }}
          owner: spire-labs
          repositories: ${{ inputs.private-submodule-repositories }}
          permission-contents: read

      - uses: actions/checkout@v4
        if: ${{ inputs.private-submodule-repositories == '' }}
        with:
          submodules: recursive

      - uses: actions/checkout@v4
        if: ${{ inputs.private-submodule-repositories != '' }}
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}
      
      - name: Set dynamic environment variables
        if: ${{ inputs['env-vars'] != '' }}
        shell: bash
        run: |
          echo "${{ inputs['env-vars'] }}" | sed '/^\s*$/d' >> $GITHUB_ENV

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Install Bun
        if: ${{ inputs.use-bun == true }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2

      - name: Install dependencies
        if: ${{ inputs.use-bun == true }}
        run: |
          bun install
      
      - name: Run Contracts Format Check
        run: |
          echo "INFO: Checking Solidity formatting..."
          cd ${{inputs.contract-directory}}
          forge fmt --check
      
      - name: Run Contracts Lint Check
        run: |
          echo "INFO: Checking Solidity lint..."
          cd ${{inputs.contract-directory}}
          forge lint
        
      - name: Run Contracts Unit Tests
        run: |
          echo "INFO: Running Solidity tests..."
          cd ${{inputs.contract-directory}}
          forge test -vvv --mc Unit
  
        
      - name: Run Contracts Integration Tests
        if: ${{ inputs.run-integration-tests == true }}
        run: |
          echo "INFO: Running Solidity integration tests..."
          cd ${{inputs.contract-directory}}
          forge test -vvv --mc Integration
    
