on:
  workflow_call:
    inputs:
      contract-directory:
        type: string
        required: false
        default: contracts
        description: the root folder for contracts
      run-integration-tests:
        type: boolean
        required: false
        default: true
        description: whether to run integration tests
      env-vars:
        description: 'Multiline list of KEY=VALUE pairs to set in the environment'
        required: false
        default: ''
        type: string
      use-bun:
        type: boolean
        required: false
        default: false
        description: whether to use Bun instead of Foundry for package management
          
jobs:
  check:
    name: "Solidity Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set dynamic environment variables
        if: ${{ inputs['env-vars'] != '' }}
        shell: bash
        run: |
          echo "${{ inputs['env-vars'] }}" | sed '/^\s*$/d' >> $GITHUB_ENV

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Install Bun
        if: ${{ inputs.use-bun == true }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.2

      - name: Install dependencies
        if: ${{ inputs.use-bun == true }}
        run: |
          bun install
      
      - name: Run Contracts Format Check
        run: |
          echo "INFO: Checking Solidity formatting..."
          cd ${{inputs.contract-directory}}
          forge fmt --check
      
      - name: Run Contracts Lint Check
        run: |
          echo "INFO: Checking Solidity lint..."
          cd ${{inputs.contract-directory}}
          forge lint
        
      - name: Run Contracts Unit Tests
        run: |
          echo "INFO: Running Solidity tests..."
          cd ${{inputs.contract-directory}}
          forge test -vvv --mc Unit
  
        
      - name: Run Contracts Integration Tests
        if: ${{ inputs.run-integration-tests == true }}
        run: |
          echo "INFO: Running Solidity integration tests..."
          cd ${{inputs.contract-directory}}
          forge test -vvv --mc Integration
    
